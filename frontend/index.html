<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskFlow - 高精度任务全生命周期管理系统" />
  <meta name="theme-color" content="#10b981" />
  <title>TaskFlow | 任务追踪系统</title>

  <!-- 预连接字体服务 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- 字体加载 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet">

  <style>
    /* 防止FOUC (Flash of Unstyled Content) */
    html {
      background: #fafcfb;
    }

    /* 初始加载动画 */
    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: linear-gradient(180deg, #fafcfb 0%, #f0f5f3 100%);
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
      animation: float 2s ease-in-out infinite;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.25);
    }

    .loading-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.875rem;
      color: #4b6358;
      letter-spacing: 0.1em;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
        box-shadow: 0 8px 24px rgba(16, 185, 129, 0.25);
      }

      50% {
        transform: translateY(-8px);
        box-shadow: 0 16px 32px rgba(16, 185, 129, 0.3);
      }
    }

    .loading-dots {
      display: flex;
      gap: 6px;
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.5;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <!-- 加载屏幕 -->
  <div id="loading-screen">
    <div class="loading-logo">TF</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <script>
    // 应用加载完成后隐藏加载屏幕
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
          setTimeout(() => loadingScreen.remove(), 400);
        }
      }, 400);
    });
  </script>
</body>

</html>
